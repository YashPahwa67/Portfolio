# Render Blueprint — deploys this Vite SPA as a static site.
# In Render: New → Blueprint → connect this repo → it reads this file.
services:
  - type: web
    name: yash-portfolio
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    # SPA fallback: serve index.html for any path that isn't a real file.
    # (Static assets are matched first, so this only catches unknown routes.)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Fingerprinted assets never change → cache them hard.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
